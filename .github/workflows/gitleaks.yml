name: Gitleaks

# Secret scanning on every push (with full history, fetch-depth 0), so no secret ever lands
# in the repo. The pull_request trigger is intentionally omitted: it only adds a redundant
# diff-scan that also needs extra API permissions on a private repo, while push already covers
# every branch update.
on:
  push:

jobs:
  gitleaks:
    name: Scan for secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
