# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    # Private, persistent storage for uploaded files (outside public/, survives deploys).
    # Built on the project's APP_SHARE_DIR convention.
    app.uploads_dir: '%kernel.project_dir%/%env(APP_SHARE_DIR)%'
    # "From" address for the reminder e-mails. Override per environment via MAILER_FROM.
    app.mailer_from: '%env(MAILER_FROM)%'
    # Organisation name shown across the app. Generic by default; the centre overrides it per
    # environment via APP_ORG_NAME (kept out of the repo on purpose).
    app.organization_name: '%env(default:app_organization_name_default:APP_ORG_NAME)%'
    app_organization_name_default: 'Centro educativo'
    # Idle-session timeout in seconds. 0 disables it (dev/test, so development sessions don't drop);
    # production overrides it in the when@prod block below.
    app.session_idle_timeout: 0

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.
        bind:
            string $uploadsDir: '%app.uploads_dir%'
            string $publicDir: '%kernel.project_dir%/public'
            int $sessionIdleTimeout: '%app.session_idle_timeout%'

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    # add more service definitions when explicit configuration is needed
    # please note that last definitions always *replace* previous ones

when@prod:
    parameters:
        # 30 minutes of inactivity. SSO (Google/Educamadrid) makes re-login a single click, so the
        # UX cost is low while it protects sessions left open on shared staff-room computers.
        app.session_idle_timeout: 1800

when@test:
    services:
        # Functional tests drive the task state machines through the same entry point as the app.
        # TaskWorkflow has no consumer yet (a controller will inject it), so the compiler would
        # remove this unused private service. A public alias keeps it alive and reachable from the
        # test container, without redefining the autowired service (so it keeps its Registry arg).
        test.task_workflow:
            alias: App\Service\TaskWorkflow
            public: true
