knpu_oauth2_client:
    clients:
        # "Entrar con Educamadrid" — Google OAuth underneath (Educamadrid is a Google Workspace
        # domain). Credentials are empty until set in .env.local, which keeps the SSO disabled.
        google:
            type: google
            client_id: '%env(GOOGLE_CLIENT_ID)%'
            client_secret: '%env(GOOGLE_CLIENT_SECRET)%'
            redirect_route: connect_google_check
            redirect_params: {}
