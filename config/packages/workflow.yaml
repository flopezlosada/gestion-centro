framework:
    workflows:
        # Un ÚNICO ciclo de vida para toda tarea (simple o con entregable): el mismo vocabulario de
        # estados para todas, sin estados que existan solo para algunos tipos.
        #   Pendiente → (Entregar) → Entregada → (Validar) → Finalizada
        #                                     ↘ (Devolver) → Pendiente     [queda en el histórico]
        #   Pendiente/Entregada → (Cancelar) → Cancelada
        # La única diferencia entre tipos NO es un estado: es si "Entregar" exige adjuntar la referencia
        # de un documento (Task::requiresDocument), lo controla el controlador. "Devolver" no crea un
        # estado "rechazada": devuelve a Pendiente (vuelta a empezar) y el evento queda en la auditoría.
        task:
            type: state_machine
            marking_store:
                type: method
                property: status
            supports:
                - App\Entity\Task
            initial_marking: pending
            places:
                - pending
                - submitted
                - validated
                - cancelled
            transitions:
                submit:
                    from: pending
                    to: submitted
                validate:
                    from: submitted
                    to: validated
                reject:
                    from: submitted
                    to: pending
                cancel:
                    from: [pending, submitted]
                    to: cancelled
