security:
    # Passwordless system: users authenticate with a magic link sent by e-mail (and, later,
    # Google/Educamadrid SSO). No password hashers are configured on purpose.
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        main:
            lazy: true
            provider: app_user_provider
            user_checker: App\Security\UserChecker
            entry_point: App\Security\LoginEntryPoint
            custom_authenticators:
                # The magic-link authenticator is registered automatically via the login_link key below.
                - App\Security\GoogleAuthenticator
            login_throttling:
                max_attempts: 5 # per IP + identifier, before the login check is throttled
                interval: '15 minutes'
            login_link:
                check_route: login_check
                signature_properties: ['id']
                lifetime: 600 # the link is valid for 10 minutes
                max_uses: 1 # single-use: the link is invalidated after the first successful use
            logout:
                path: app_logout
                target: login

    # Only the first matching rule applies.
    access_control:
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/connect, roles: PUBLIC_ACCESS }
        # Machine-to-machine cron endpoints are authenticated by a shared secret token in the
        # controller (not a session), so the firewall must let them through unauthenticated. Each is
        # pinned to its exact path so a broad ^/cron prefix never opens a future route by accident.
        # (Added per endpoint as the task-alert cron is built.)
        # The activity trail is sensitive (it shows everyone's actions): admins only.
        - { path: ^/audit, roles: ROLE_ADMIN }
        # User/role administration: admins only.
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/, roles: ROLE_USER }
